<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="8" y="8" width="112" height="112" rx="24" ry="24" fill="url(#bg)" stroke="#4a4a6a" stroke-width="2"/>
  <!-- Terminal prompt symbol "&gt;" -->
  <text x="38" y="62" font-family="monospace" font-size="48" font-weight="bold" fill="#00d4aa">&gt;</text>
  <!-- Underscore cursor -->
  <rect x="68" y="56" width="28" height="5" rx="2" ry="2" fill="#00d4aa"/>
  <!-- Small gear icon bottom-right -->
  <circle cx="92" cy="92" r="14" fill="none" stroke="#7c7cac" stroke-width="2.5"/>
  <circle cx="92" cy="92" r="6" fill="#7c7cac"/>
</svg>
