# Stub config for future releases. Run `goreleaser release` once tags are ready.
version: 2
project_name: Set-My-Ghostty
builds:
  - id: smg
    main: ./cmd/smg
    binary: smg
    env: [ CGO_ENABLED=1 ]
    goos: [ linux, darwin ]
    goarch: [ amd64, arm64 ]
archives:
  - formats: [ tar.gz ]
    name_template: "smg_{{ .Os }}_{{ .Arch }}"
release:
  draft: true
