name: Release
on:
  push:
    tags: [ 'v*' ]
permissions:
  contents: write
jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    goos: linux,  goarch: amd64 }
          - { os: ubuntu-24.04-arm, goos: linux,  goarch: arm64 }
          # Both macOS targets run on Apple-Silicon runners (plentiful).
          # darwin/amd64 is cross-built within macOS via CGO; the Intel
          # runner image (macos-13) is deprecated and queues for a long time.
          - { os: macos-latest,     goos: darwin, goarch: amd64 }
          - { os: macos-latest,     goos: darwin, goarch: arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Install Fyne build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Build
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags "-X main.version=${GITHUB_REF_NAME}" -o smg ./cmd/smg
      - name: Package
        run: |
          name="smg_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}"
          tar -czf "${name}.tar.gz" smg README.md LICENSE
      - uses: actions/upload-artifact@v4
        with:
          name: smg_${{ matrix.goos }}_${{ matrix.goarch }}
          path: smg_*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -R dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
